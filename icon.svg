<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)" />

  <!-- Notebook lines representing cells -->
  <!-- Cell 1 - normal -->
  <rect x="24" y="24" width="58" height="14" rx="3" fill="white" opacity="0.9" />

  <!-- Cell 2 - skipped (orange with skip icon) -->
  <rect x="24" y="46" width="58" height="14" rx="3" fill="url(#accent)" opacity="0.9" />

  <!-- Cell 3 - normal -->
  <rect x="24" y="68" width="58" height="14" rx="3" fill="white" opacity="0.9" />

  <!-- Cell 4 - normal -->
  <rect x="24" y="90" width="58" height="14" rx="3" fill="white" opacity="0.9" />

  <!-- Skip arrow (double chevron) over the orange cell, positioned to the right -->
  <g transform="translate(92, 38)" fill="white" opacity="0.95">
    <!-- First chevron -->
    <path d="M0,6 L10,15 L0,24" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Second chevron -->
    <path d="M12,6 L22,15 L12,24" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
